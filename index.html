
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    background: #e9e4db;
    font-family: 'Cormorant Garamond', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
}

/* ❤️ Hearts */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    top: 0;
    left: 0;
    z-index: 0;
}

.heart {
    position: absolute;
    bottom: -20px;
    animation: floatUp linear infinite;
    opacity: 0.6;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Countdown */
.countdown-box {
    margin-top: 20px;
    padding: 12px 20px;
    border: 2px solid #c9a24a;
    border-radius: 15px;
    background: #f8f6f3;
    font-size: 24px;
    letter-spacing: 3px;
    z-index: 1;
}

/* Card */
.card {
    width: 92%;
    max-width: 500px;
    margin: 20px auto;
    background: #f8f6f3;
    padding: 30px 20px;
    border-radius: 15px;
    text-align: center;
    z-index: 1;
}

/* Names */
.names {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    font-family: 'Great Vibes', cursive;
    font-size: clamp(40px, 8vw, 65px);
}

.name {
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}

.names span {
    font-size: 22px;
    color: #c9a24a;
}

/* Info rows */
.info {
    margin-top: 25px;
}

.row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    font-size: 20px;
}

.row i {
    color: #c9a24a;
}

/* Hall */
.hall {
    font-size: 26px;
    font-weight: 600;
    color: #c9a24a;
}

/* Club */
.club {
    font-size: 16px;
    letter-spacing: 2px;
}

/* Map */
.map {
    width: 92%;
    max-width: 500px;
    margin-bottom: 30px;
    z-index: 1;
}

iframe {
    width: 100%;
    height: 220px;
    border: none;
    border-radius: 10px;
}

/* Mobile tweaks */
@media (max-width: 480px) {
    .countdown-box {
        font-size: 20px;
    }
    .row {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- Countdown -->
<div class="countdown-box">
    <div id="countdown">00 : 00 : 00 : 00</div>
</div>

<!-- Card -->
<div class="card">

    <div class="names">
        <div class="name">Yasser</div>
        <span>&</span>
        <div class="name">Mariam</div>
    </div>

    <div class="info">

        <div class="row">
            <i class="fa-solid fa-calendar-days"></i>
            <div>5-7-2026</div>
        </div>

        <div class="row">
            <i class="fa-solid fa-clock"></i>
            <div>7:00 PM</div>
        </div>

        <div class="row hall">
            <i class="fa-solid fa-champagne-glasses"></i>
            <div>Almasa Hall</div>
        </div>

        <div class="row club">
            <i class="fa-solid fa-location-dot"></i>
            <div>Nady El Fath</div>
        </div>

    </div>

</div>

<!-- Map -->
<div class="map">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d54559.30404496803!2d30.03963644882219!3d31.27729836648228!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14f5c4e9469aaaab%3A0xab39831b3f51bffa!2z2YbYp9iv2Yog2KfZhNmB2KrYrSDYp9mE2LHZitin2LbZiiAoINmB2YbYr9mCINio2KfZhNmFICk!5e0!3m2!1sar!2seg!4v1777155294689!5m2!1sar!2seg"></iframe>
</div>

<script>
// Countdown (fix mobile)
var countDownDate = new Date(2026, 6, 5, 19, 0, 0).getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = countDownDate - now;

    var d = Math.floor(distance / (1000 * 60 * 60 * 24));
    var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var s = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        d + " : " + h + " : " + m + " : " + s;
}, 1000);

// Hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (5 + Math.random() * 4) + "s";
    heart.style.fontSize = (12 + Math.random() * 18) + "px";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => heart.remove(), 9000);
}
setInterval(createHeart, 600);
</script>

</body>
</html>
